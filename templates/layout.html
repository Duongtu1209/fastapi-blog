<!DOCTYPE html>
<html lang="en" class="auto">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Site Info -->
    {% if title %}
    <title>FastAPI Blog - {{ title }}</title>
    {% else %}
    <title>FastAPI Blog</title>
    {% endif %}
    <meta name="description" content="FastAPI Tutorial">
    <meta name="author" content="Corey Schafer">

    <!-- Open Graph Tags: The title of the page for social media sharing. It can match the title tag or be more descriptive. -->
    <meta property="og:title" content="FastAPI Blog">
    <!-- Open Graph Tags: Typically set to "website" for static sites or "article" for content-heavy pages. -->
    <meta property="og:type" content="website">
    <!-- Open Graph Tags: The URL of the page, used to ensure link previews resolve to the correct page. -->
    <meta property="og:url" content="">
    <!-- Open Graph Tags: URL of an image that represents the page. Useful for link previews. -->
    <meta property="og:image" content="">
    <!-- Open Graph Tags: Provides an alternative text for the image to improve accessibility. -->
    <meta property="og:image:alt" content="">

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Custom Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        steel: '#527c9f',
                        steelHover: '#466a87'
                    },
                    fontFamily: {
                        heading: ['Montserrat', 'sans-serif'],
                        body: ['Nunito', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">
    <style>
        /* Temporary overrides to ensure main.css doesn't break tailwind */
        .bg-steel {
            background-color: #527c9f;
        }
    </style>

    <!-- Set a theme color that matches your website's primary color -->
    <meta name="theme-color" content="#527c9f">

    <!-- Favicon -->
    <link rel="icon" href="/static/icons/favicon.ico" sizes="any">
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon.png">
    <link rel="manifest" href="/static/site.webmanifest">
</head>

<body
    class="flex flex-col min-h-screen bg-gray-50 text-gray-800 dark:bg-[#1a1a1a] dark:text-gray-200 font-body transition-colors duration-200">
    <header class="site-header">
        <nav
            class="bg-steel dark:bg-gray-800 fixed w-full z-20 top-0 start-0 border-b border-gray-200 dark:border-gray-700 shadow-sm">
            <div class="flex flex-wrap items-center justify-between p-4">
                <a href="#"
                    class="flex items-center space-x-3 rtl:space-x-reverse font-heading text-white text-2xl font-bold hover:text-gray-200 transition">
                    FastAPI Blog
                </a>

                <button data-collapse-toggle="navbar-default" type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-100 rounded-lg md:hidden hover:bg-steelHover focus:outline-none focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-600"
                    aria-controls="navbar-default" aria-expanded="false" id="navbar-toggle">
                    <span class="sr-only">Open main menu</span>
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 17 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M1 1h15M1 7h15M1 13h15" />
                    </svg>
                </button>

                <div class="hidden w-full md:flex md:w-auto md:items-center" id="navbar-default">
                    <ul
                        class="font-medium flex flex-col p-4 md:p-0 mt-4 md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0">
                        <li>
                            <a aria-current="page" href="#"
                                class="block py-2 px-3 text-white rounded md:bg-transparent md:text-white md:font-semibold md:p-0 hover:text-gray-300">Home</a>
                        </li>
                    </ul>

                    <div class="flex flex-col md:flex-row md:items-center mt-4 md:mt-0 md:ml-8 gap-3">
                        <a href="#"
                            class="text-white border border-white hover:bg-white hover:text-steel focus:ring-4 focus:outline-none focus:ring-steelHover font-medium rounded text-sm px-4 py-2 text-center transition-colors">Login</a>
                        <a href="#"
                            class="text-steel bg-white border border-white hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 font-medium rounded text-sm px-4 py-2 text-center transition-colors">Register</a>

                        <!-- Theme Toggle Button -->
                        <div class="relative mt-2 md:mt-0">
                            <button id="theme-menu-button" type="button"
                                class="text-white hover:bg-steelHover focus:outline-none focus:ring-4 focus:ring-steelHover rounded-lg text-sm px-3 py-2 text-center inline-flex items-center transition-colors">
                                <span id="bd-theme-text">🌗 Auto</span>
                                <svg class="w-2.5 h-2.5 ms-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                    fill="none" viewBox="0 0 10 6">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                        stroke-width="2" d="m1 1 4 4 4-4" />
                                </svg>
                            </button>
                            <!-- Dropdown menu -->
                            <div id="theme-dropdown"
                                class="z-10 hidden absolute right-0 mt-2 bg-white divide-y divide-gray-100 rounded-lg shadow w-32 dark:bg-gray-700">
                                <ul class="py-2 text-sm text-gray-700 dark:text-gray-200">
                                    <li><button
                                            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white theme-option"
                                            data-theme="light">🌝 Light</button></li>
                                    <li><button
                                            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white theme-option"
                                            data-theme="dark">🌚 Dark</button></li>
                                    <li><button
                                            class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white theme-option"
                                            data-theme="auto">🌗 Auto</button></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main role="main" class="w-full px-4 pt-24 pb-8 flex-grow">
        <div class="flex flex-wrap -mx-4">
            <div class="w-full md:w-2/3 px-4">
                {% block content %}
                {% endblock content %}
            </div>
            <aside class="w-full md:w-1/3 px-4 mt-8 md:mt-0">
                <div
                    class="bg-white dark:bg-[#2d2d2d] rounded-lg shadow-sm border border-gray-200 dark:border-[#4a4a4a] p-6 mb-6">
                    <h3 class="text-xl font-heading font-semibold text-gray-800 dark:text-[#f0f0f0] mb-2">Our Sidebar
                    </h3>
                    <p class="text-gray-500 text-sm mb-4">You can put any information here you'd like.</p>
                    <ul class="flex flex-col border border-gray-200 dark:border-[#404040] rounded-lg">
                        <li
                            class="px-4 py-2.5 border-b border-gray-200 dark:border-[#404040] text-gray-700 dark:text-[#f0f0f0]">
                            Latest Posts</li>
                        <li
                            class="px-4 py-2.5 border-b border-gray-200 dark:border-[#404040] text-gray-700 dark:text-[#f0f0f0]">
                            Announcements</li>
                        <li
                            class="px-4 py-2.5 border-b border-gray-200 dark:border-[#404040] text-gray-700 dark:text-[#f0f0f0]">
                            Calendars</li>
                        <li class="px-4 py-2.5 text-gray-700 dark:text-[#f0f0f0]">etc</li>
                    </ul>
                </div>
            </aside>
        </div>
    </main>

    <footer class="mt-auto py-5 bg-gray-100 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 text-center">
        <div class="max-w-5xl mx-auto px-4">
            <p class="text-gray-500 dark:text-gray-400 mb-0">
                © <span id="year"></span> FastAPI Blog
            </p>
        </div>
    </footer>

    <!-- Set the current year in the footer -->
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

    <!-- Navbar Toggle -->
    <script>
        const toggleButton = document.getElementById('navbar-toggle');
        const navbarMenu = document.getElementById('navbar-default');
        toggleButton.addEventListener('click', () => {
            navbarMenu.classList.toggle('hidden');
        });
    </script>

    <!-- Theme Toggle and Dropdown -->
    <script>
        const themeMenuBtn = document.getElementById('theme-menu-button');
        const themeDropdown = document.getElementById('theme-dropdown');
        const themeTextSpan = document.getElementById('bd-theme-text');

        // Toggle dropdown
        themeMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('hidden');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            if (!themeDropdown.classList.contains('hidden')) {
                themeDropdown.classList.add('hidden');
            }
        });

        const setTheme = (theme) => {
            const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            localStorage.setItem('theme', theme);

            // Update button text
            const themeText = { light: '🌝 Light', dark: '🌚 Dark', auto: '🌗 Auto' };
            themeTextSpan.textContent = themeText[theme];
        };

        // Set theme on option click
        document.querySelectorAll('.theme-option').forEach(button => {
            button.addEventListener('click', () => setTheme(button.getAttribute('data-theme')));
        });

        // Initialize theme
        setTheme(localStorage.getItem('theme') || 'auto');

        // Listen for OS variations
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (localStorage.getItem('theme') === 'auto') {
                setTheme('auto');
            }
        });
    </script>
</body>

</html>
